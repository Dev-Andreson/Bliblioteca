<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="Description" content="">
    <meta name="Keywords" content="Leitura, Livros, Estudos, Pesquisa, Alunos, Bliblioteca, Fantasia, Drama, Romance">
    <link rel="apple-touch-icon" sizes="180x180" href="/imagens/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/imagens/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/imagens/favicon-16x16.png">
    <link rel="manifest" href="/semear/site.webmanifest">
    <meta property="og:site_name" content="Bliblioteca">
    <meta property="og:locale" content="pt_BR">
    <meta property="og:type" content="Site oficial da Biblioteca X com acervo de livros, artigos e materiais digitais para pesquisa.">
    <!-- Css Inicio-->
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- Css Fim-->
    <!-- JavaScript Inicio-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous" defer></script>
    <!-- JavaScript Fim-->
    <meta name="author" content="dev.andreson, Vinícius Galdino, Rogério, Emanuel">
    <title>Bliblioteca Digital</title>
</head>
<body>
    
    <header>
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
            <div class="container-fluid">
                <a class="navbar-brand" href="index.html">Biblioteca</a>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <form class="d-flex" role="search">
                        <input id="search-input" class="form-control me-2" type="search" placeholder="Pesquisar..."/>
                        <button id="search-btn" class="btn btn-outline-success" type="button">Buscar</button>
                    </form>
                </div>
                <div class="login">
                    <a class="nav-link" href="src/cadastro/cadastro.html">Cadastrar</a>
                    <a class="nav-link" href="src/cadastro/login.html">Login</a>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <section class="inicio">
            <div id="carouselExampleCaptions" class="carousel slide">
                <div class="carousel-indicators">
                    <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
                    <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="1" aria-label="Slide 2"></button>
                    <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="2" aria-label="Slide 3"></button>
                </div>
                <div class="carousel-inner">
                    <div class="carousel-item active">
                        <img src="assets/midia/1.png" class="d-block w-100" alt="...">
                        <div class="carousel-caption d-none d-md-block">
                            <h5>Pesquise seu livro preferido</h5>
                            <p>E comece a ler sem preocupações</p>
                        </div>
                    </div>
                    <div class="carousel-item">
                        <img src="assets/midia/2.png" class="d-block w-100" alt="...">
                        <div class="carousel-caption d-none d-md-block">
                            <h5>Saiba mais sobre nós</h5>
                            <p>Nós conheça mais de perto</p>
                        </div>
                    </div>
                    <div class="carousel-item">
                        <img src="assets/midia/3.png" class="d-block w-100" alt="...">
                        <div class="carousel-caption d-none d-md-block">
                            <h5>Desenvolvedores</h5>
                            <p>Conheça nossos desenvolvedores</p>
                        </div>
                    </div>
                </div>
                <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide="prev">
                    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Previous</span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide="next">
                    <span class="carousel-control-next-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Next</span>
                </button>
            </div>
        </section>
    </main>

    <script src="src/api/api.js" defer></script>
    
</body>
</html>
